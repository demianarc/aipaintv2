<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art AI Interpreter</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>Art AI Interpreter</h1>
            <div id="loading-indicator">Loading...</div>
            <img id="painting-image" style="display:none;" class="painting" />
            <div id="painting-info" class="info" style="display:none;"></div>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetchInterpretation();
        });

        function fetchInterpretation() {
            fetch('/interpretation')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('loading-indicator').innerText = 'Error loading interpretation.';
                    } else {
                        document.getElementById('painting-image').src = data.image_url;
                        document.getElementById('painting-image').style.display = 'block';
                        document.getElementById('painting-info').innerHTML = data.info;
                        document.getElementById('painting-info').style.display = 'block';
                        document.getElementById('loading-indicator').style.display = 'none';
                    }
                })
                .catch(error => {
                    console.error('Error fetching interpretation:', error);
                    document.getElementById('loading-indicator').innerText = 'Error loading interpretation.';
                });
        }
    </script>
</body>
</html>
